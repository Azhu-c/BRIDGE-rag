project:
  name: binary-lifting
  stage: pipeline

environment:
  dotenv_path: default.env
  model_cache_dir: ./.cache/huggingface
  llvm_tmp_dir: /tmp
  deepseek_api_key_env: DEEPSEEK_API_KEY
  deepseek_base_url_env: DEEPSEEK_BASE_URL

pipeline:
  stage: all   # lift | refine | all
  input_json: ./artifacts/pipeline/input.json

lift:
  enabled: true

refinement:
  enabled: true
  api_key: ''
  base_url: https://api.deepseek.com
